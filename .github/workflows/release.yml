name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  metadata:
    name: Metadata
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.meta.outputs.channel }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          npm_version="$(node -p "require('./npm/package.json').version")"

          if [[ "$cargo_version" != "$npm_version" ]]; then
            echo "Cargo.toml version ($cargo_version) does not match npm/package.json version ($npm_version)" >&2
            exit 1
          fi

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
            if [[ "$version" != "$cargo_version" ]]; then
              echo "Git tag version ($version) does not match package version ($cargo_version)" >&2
              exit 1
            fi
            channel="release"
          else
            version="${cargo_version}-nightly.${GITHUB_RUN_NUMBER}"
            tag="v${version}"
            channel="nightly"
          fi

          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          # Intel macOS runners are retired; cross-compile from the arm64 runner.
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" -czf "dist/portproxy-${{ matrix.target }}.tar.gz" portproxy

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: portproxy-${{ matrix.target }}
          path: dist/portproxy-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  github-release:
    name: GitHub ${{ needs.metadata.outputs.channel }}
    needs:
      - metadata
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          name: portproxy ${{ needs.metadata.outputs.version }}
          prerelease: ${{ needs.metadata.outputs.channel == 'nightly' }}
          make_latest: ${{ needs.metadata.outputs.channel == 'release' }}
          generate_release_notes: true
          files: dist/portproxy-*.tar.gz

  npm-publish:
    name: npm ${{ needs.metadata.outputs.channel }}
    needs:
      - metadata
      - github-release
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org

      - name: Set nightly package version
        if: needs.metadata.outputs.channel == 'nightly'
        working-directory: npm
        run: npm version --no-git-tag-version "${{ needs.metadata.outputs.version }}"

      - name: Publish nightly
        if: needs.metadata.outputs.channel == 'nightly'
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access=public --tag nightly

      - name: Publish release
        if: needs.metadata.outputs.channel == 'release'
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access=public --tag latest
