name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches Cargo.toml and npm/package.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          NPM_VERSION=$(node -p "require('./npm/package.json').version")
          echo "tag=$TAG_VERSION cargo=$CARGO_VERSION npm=$NPM_VERSION"
          test "$TAG_VERSION" = "$CARGO_VERSION"
          test "$TAG_VERSION" = "$NPM_VERSION"
      - name: Syntax-check install.js
        run: node --check npm/install.js

  build:
    needs: check-version
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          # Intel macOS runners are retired; cross-compile from the arm64 runner
          # (pure-Rust deps, Apple SDK ships both arches).
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: tar -czf portproxy-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release portproxy
      - uses: actions/upload-artifact@v4
        with:
          name: portproxy-${{ matrix.target }}
          path: portproxy-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: portproxy-*.tar.gz
          generate_release_notes: true

  npm-publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish to npm
        run: npm publish --ignore-scripts
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
